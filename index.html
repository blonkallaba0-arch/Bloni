<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <title>Pinguin Shop</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to bottom, #c94c4c, #6b1d1d);
    }

    .container {
      text-align: center;
      color: white;
      width: 300px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .logo {
      margin-bottom: 20px;
      font-size: 40px;
    }

    .logo p {
      margin-top: 5px;
      font-weight: bold;
      font-size: 14px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    input {
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.5);
      outline: none;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #aeb4c0;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #949aa5;
    }

    .links {
      margin-top: 15px;
      font-size: 12px;
    }

    .links a {
      color: #00c3ff;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Pinguin Shop</h1>

  <div class="logo">
    🐧
    <p>Pinguin Shop</p>
  </div>

  <form id="loginForm">
    <input type="email" placeholder="Email" required>
    <input type="password" placeholder="Password" required>

    <button type="submit">Kyqu ne Dyqan</button>
  </form>

  <div class="links">
    <p>Keni harruar fjalëkalimin?</p>
    <p>Nuk keni llogari? <a href="#">Regjistrohu</a></p>
  </div>
</div>

<script>
  document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const email = document.querySelector("input[type='email']").value;
    const password = document.querySelector("input[type='password']").value;

    if(email === "" || password === "") {
      alert("Ploteso te gjitha fushat");
      return;
    }

    if(email === "admin@gmail.com" && password === "1234") {
      alert("Kyqja u krye me sukses!");
    } else {
      alert("Email ose password gabim!");
    }
  });
</script>

</body>
</html>
